{% extends "base.html" %}
{% block title %}Passwort setzen{% endblock %}
{% block content_noauth %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <img src="{{ url_for('static', filename='logo.png') }}" alt="EEG" style="height:60px;border-radius:8px;">
                    <h4 class="mt-3" style="color:#17252a;">Willkommen bei der EEG</h4>
                    <p class="text-muted">Setzen Sie Ihr Passwort für den Zugang.</p>
                </div>
                <div class="alert alert-info py-2">
                    <small><i class="bi bi-info-circle"></i> Ihr Benutzername: <strong>{{ username }}</strong></small>
                </div>
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">Neues Passwort</label>
                        <input type="password" name="password" class="form-control" minlength="6" required autofocus>
                        <div class="form-text">Mindestens 6 Zeichen</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Passwort bestätigen</label>
                        <input type="password" name="confirm_password" class="form-control" minlength="6" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100"><i class="bi bi-check-lg"></i> Passwort setzen</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
