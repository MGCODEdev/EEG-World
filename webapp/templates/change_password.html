{% extends "base.html" %}
{% block title %}Passwort ändern{% endblock %}
{% block content %}
<h2 class="mb-4"><i class="bi bi-key"></i> Passwort ändern</h2>

<div class="card" style="max-width: 500px;">
    <div class="card-body">
        <form method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label class="form-label">Altes Passwort</label>
                <input type="password" name="old_password" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Neues Passwort</label>
                <input type="password" name="new_password" class="form-control" required minlength="6">
            </div>
            <div class="mb-3">
                <label class="form-label">Neues Passwort bestätigen</label>
                <input type="password" name="confirm_password" class="form-control" required minlength="6">
            </div>
            <button type="submit" class="btn btn-success">Passwort ändern</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary ms-2">Abbrechen</a>
        </form>
    </div>
</div>
{% endblock %}
