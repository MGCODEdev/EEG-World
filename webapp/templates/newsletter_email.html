<!doctype html>
<html lang="de">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{{ subject }}</title></head>
<body style="margin:0;padding:0;background:#f6f4ee;font-family:Arial, Helvetica, sans-serif;color:#203040;">
  <div style="display:none;max-height:0;overflow:hidden;opacity:0;">{{ preview_text }}</div>
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#f6f4ee;">
    <tr><td align="center" style="padding:34px 12px;">
      <table role="presentation" width="680" cellspacing="0" cellpadding="0" border="0" style="width:100%;max-width:680px;background:#ffffff;border-radius:0;box-shadow:0 8px 24px rgba(20,35,45,.06);overflow:hidden;">
        <!-- LOGO HEADER -->
        <tr>
          <td style="padding:30px 42px 20px 42px;border-bottom:1px solid #e9e3d7;">
            <a href="{{ public_cfg['org_website'] if public_cfg is defined else org_website }}" target="_blank" style="text-decoration:none;">
              <img src="{{ logo_url }}" width="320" alt="{{ public_cfg['org_name'] if public_cfg is defined else org_name }}" style="display:block;width:320px;max-width:100%;height:auto;border:0;">
            </a>
          </td>
        </tr>
        <!-- CONTENT -->
        <tr>
          <td style="padding:40px 42px 20px 42px;">
            <div style="font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#b9871e;font-weight:bold;margin-bottom:14px;">{{ edition_label }}</div>
            <h1 style="margin:0 0 16px 0;font-size:30px;line-height:1.25;color:#0b2637;font-weight:700;letter-spacing:-0.2px;">{{ headline }}</h1>
            {% if subtitle %}
            <p style="margin:0;font-size:16px;line-height:1.65;color:#465766;">{{ subtitle }}</p>
            {% endif %}
          </td>
        </tr>
        <!-- BODY HTML (editable content) -->
        <tr><td style="padding:18px 42px 10px 42px;">
          {{ body_html|safe }}
        </td></tr>
        <!-- FOOTER -->
        <tr><td style="padding:28px 42px;background:#f4efe4;color:#6b6257;font-size:12px;line-height:1.6;">
          {{ public_cfg['org_name'] if public_cfg is defined else org_name }} · <a href="{{ public_cfg['org_website'] if public_cfg is defined else org_website }}" style="color:#0b2637;text-decoration:underline;">{{ public_cfg['org_website'] if public_cfg is defined else org_website }}</a><br>
          <a href="{{ unsubscribe_url }}" style="color:#6b6257;text-decoration:underline;">Newsletter abbestellen</a>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body></html>
